# 化学業界ニュースダイジェスト 設定ファイル
# このファイルを編集するだけでツールの挙動を変更できます

# ---- 関心キーワード ----
# タイトル・要約にこれらのキーワードが含まれる記事だけを収集します
interest_keywords:
  # 化学業界（国内メーカー・市況）
  - 化学メーカー
  - 化学工業
  - 化学品
  - 素材
  - 樹脂
  - ポリマー
  - 高分子
  - 触媒
  - 石化
  - 石油化学
  - 機能性材料
  - 化学プラント
  # 主要国内メーカー
  - 信越化学
  - 東レ
  - 旭化成
  - 三菱ケミカル
  - 住友化学
  - DIC
  - 積水化学
  - クラレ
  - 東ソー
  - 三井化学
  # 化学×AI・DX
  - マテリアルズインフォマティクス
  - AI創薬
  - 化学 AI
  - 素材 DX
  - スマート工場
  - デジタル製造

# ---- RSSフィード（Google News で日本語化学ニュースを収集）----
# Google News RSS は化学工業日報・日経・Bloomberg等を横断して取得できる
rss_feeds:
  - name: "Google News：化学業界"
    url: "https://news.google.com/rss/search?q=%E5%8C%96%E5%AD%A6+%E3%83%A1%E3%83%BC%E3%82%AB%E3%83%BC+%E6%A5%AD%E7%95%8C&hl=ja&gl=JP&ceid=JP:ja"
  - name: "Google News：素材・高分子"
    url: "https://news.google.com/rss/search?q=%E7%B4%A0%E6%9D%90+%E9%AB%98%E5%88%86%E5%AD%90+%E6%A8%B9%E8%84%82+%E7%9F%B3%E6%B2%B9%E5%8C%96%E5%AD%A6&hl=ja&gl=JP&ceid=JP:ja"
  - name: "Google News：化学×AI"
    url: "https://news.google.com/rss/search?q=%E5%8C%96%E5%AD%A6+AI+%E3%83%9E%E3%83%86%E3%83%AA%E3%82%A2%E3%83%AB%E3%82%BA%E3%82%A4%E3%83%B3%E3%83%95%E3%82%A9%E3%83%9E%E3%83%86%E3%82%A3%E3%82%AF%E3%82%B9&hl=ja&gl=JP&ceid=JP:ja"
  - name: "MONOist（製造業・材料技術）"
    url: "https://rss.itmedia.co.jp/rss/2.0/monoist.xml"

# ---- 収集・フィルタ設定 ----
delivery:
  days_back: 7           # 週1配信
  min_score: 3           # ★3以上を配信
  max_rss_per_feed: 20   # Google News は記事数が多いので少なめに

# ---- AI要約設定 ----
# GEMINI_API_KEY 環境変数が未設定の場合は原文がそのまま掲載されます（スキップ）
gemini_model: "gemini-2.5-flash"

# ---- メール設定 ----
email:
  from_env: GMAIL_ADDRESS
  password_env: GMAIL_APP_PASSWORD
  to_env: TO_ADDRESSES
  subject_prefix: "⚗️ 業界ニュースダイジェスト"
